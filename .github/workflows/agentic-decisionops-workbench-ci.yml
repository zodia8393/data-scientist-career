name: agentic-decisionops-workbench-ci

on:
  push:
    branches: ["main"]
    paths:
      - "agentic-decisionops-workbench/**"
      - ".github/workflows/agentic-decisionops-workbench-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "agentic-decisionops-workbench/**"
      - ".github/workflows/agentic-decisionops-workbench-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: agentic-decisionops-workbench

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: agentic-decisionops-workbench/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile src/agentic_decisionops_workbench/*.py src/agentic_decisionops_workbench/domain_adapters/*.py tests/*.py

      - name: Unit and smoke tests
        env:
          OUTPUT_ROOT: /tmp/agentic-decisionops-workbench-ci
          BIKE_SHARE_OUTPUT_ROOT: /tmp/bike-share-demand-resilience-ci
        run: scripts/run_all.sh
