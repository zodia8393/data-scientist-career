name: pages-demo

on:
  push:
    branches: ["main"]
    paths:
      - "docs/demo/**"
      - ".github/workflows/pages-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload demo
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/demo

      - name: Deploy demo
        id: deployment
        uses: actions/deploy-pages@v4
