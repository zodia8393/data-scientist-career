name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile src/agentic_decisionops_workbench/*.py src/agentic_decisionops_workbench/domain_adapters/*.py tests/*.py

      - name: Unit and smoke tests
        env:
          OUTPUT_ROOT: /tmp/agentic-decisionops-workbench-ci
        run: scripts/run_all.sh
